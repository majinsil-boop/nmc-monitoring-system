name: 매일 데이터 수집

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 오전 8시 (한국시간 = UTC+9)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Python 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install playwright
          playwright install chromium

      - name: 데이터 수집
        run: |
          python assembly_search.py
          python schedule_search.py
          python news_monitor.py
        env:
          ASSEMBLY_API_KEY: ${{ secrets.ASSEMBLY_API_KEY }}

      - name: JSON 파일 GitHub에 push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *_results_*.json
          git diff --staged --quiet || git commit -m "자동 데이터 수집 $(date +'%Y-%m-%d')"
          git push
